name: Deploy PetCare to Production

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '24'
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt
      
      - name: Test backend (syntax check)
        run: cd backend && python -m py_compile app/main.py
  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: ssh-keyscan -H 101.200.146.234 >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        run: |
          ssh root@101.200.146.234 << 'EOF'
            cd /root/workspace/petcare
            
            # 创建备份
            ./scripts/backup.sh
            
            # 拉取最新代码
            git pull origin main
            
            # 构建前端
            cd frontend && npm ci && npm run build && cd ..
            
            # 部署前端到 /var/www/petcare/
            cp -r frontend/dist/* /var/www/petcare/
            
            # 同步静态资源到 OSS
            ossutil cp -r /var/www/petcare/assets/ oss://website-petcare-oss-bj/assets/ --update --force
            
            # 重启后端
            sudo systemctl restart petcare.service
            
            # 等待服务启动
            sleep 5
            
            # 健康检查
            curl -f http://127.0.0.1:8000/ || exit 1
            
            echo "✅ 部署成功"
          EOF

